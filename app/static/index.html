<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Remote Input</title>
  <link rel="manifest" href="/manifest.webmanifest?v=20260610-01">
  <link rel="stylesheet" href="/static/styles.css?v=20260703-01">
</head>
<body>
  <main class="app">
    <section id="loginView" class="card login-card hidden">
      <h1>Remote Input</h1>
      <p class="muted">登录后即可用手机远程输入 Windows 键盘事件。</p>
      <form id="loginForm" class="form">
        <input id="password" type="password" autocomplete="current-password" placeholder="访问密码" required>
        <label class="checkline login-remember">
          <input id="keepSignedIn" type="checkbox">
          <span>记住登录状态（不保存密码）</span>
        </label>
        <p class="hint login-hint">仅使用 HttpOnly 会话 Cookie，不在前端保存明文密码。</p>
        <button type="submit">登录</button>
      </form>
      <p id="loginError" class="error"></p>
    </section>

    <section id="controlView" class="hidden">
      <header class="topbar">
        <div>
          <h1>Remote Input</h1>
          <p id="statusText" class="status">未连接</p>
        </div>
        <div class="metrics">
          <span id="latency">-- ms</span>
          <div class="metrics-actions">
            <button id="settingsBtn" class="ghost">设置</button>
            <button id="logoutBtn" class="ghost">退出</button>
          </div>
        </div>
      </header>

      <section class="screen-card card">
        <div class="screen-controls">
          <button id="desktopLeftBtn" class="secondary" type="button">← 桌面</button>
          <button id="screenToggle" class="screen-toggle" type="button" aria-pressed="false">
            <span id="screenToggleText" class="screen-toggle-main">开启预览</span>
            <span class="screen-toggle-title-wrap"><span id="screenWindowTitle" class="screen-toggle-title">[无窗口]</span></span>
          </button>
          <button id="desktopRightBtn" class="secondary" type="button">桌面 →</button>
        </div>
        <div id="screenPreview" class="screen-preview off" role="button" aria-label="预览当前屏幕截图">
          <div id="screenStage" class="screen-stage">
            <img id="screenImage" class="screen-image" alt="电脑屏幕预览">
            <div id="screenCursorLayer" class="cursor-layer">
              <div id="screenCursor" class="screen-cursor"></div>
            </div>
          </div>
          <span id="screenPlaceholder">屏幕预览已关闭，请点上方按钮开启</span>
        </div>
      </section>

      <section class="card">
        <label class="label" for="textInput">文本输入</label>
        <div class="text-input-row">
          <textarea id="textInput" rows="1" placeholder="输入文字后按 Enter 发送"></textarea>
          <button id="newlineBtn" class="secondary newline-button" type="button" aria-label="插入换行">↵</button>
        </div>
        <div class="row">
          <button id="sendTextBtn">发送文本</button>
          <button id="clipBtn" class="secondary">同步剪贴板</button>
        </div>
      </section>

      <section class="card touch-section">
        <div class="screen-controls touch-controls">
          <button id="windowLeftBtn" class="secondary" type="button">← 窗口</button>
          <button id="touchToggle" class="section-toggle wheel-surface" type="button" aria-expanded="false">展开触控板
（按住滚轮）</button>
          <button id="windowRightBtn" class="secondary" type="button">窗口 →</button>
        </div>
        <div id="touchPanel" class="touch-panel collapsed">
          <div id="touchPad" class="touch-pad">
            <span>触控板：单指移动，轻点左键</span>
          </div>
          <div class="row three">
            <button data-click="left">左键</button>
            <button id="wheelButton" class="wheel-surface" type="button">滚轮</button>
            <button data-click="right">右键</button>
          </div>
        </div>
      </section>

      <section class="keyboard card">
        <div class="row four">
          <button class="toggle" data-key="ctrl">Ctrl</button>
          <button class="toggle" data-key="alt">Alt</button>
          <button class="toggle" data-key="shift">Shift</button>
          <button class="toggle" data-key="win">Win</button>
        </div>
        <div class="row four">
          <button data-tap="esc">ESC</button>
          <button data-tap="tab">Tab</button>
          <button data-tap="backspace">⌫</button>
          <button data-tap="enter">Enter</button>
        </div>
        <div class="arrows">
          <span></span>
          <button data-tap="up">↑</button>
          <span></span>
          <button data-tap="left">←</button>
          <button data-tap="down">↓</button>
          <button data-tap="right">→</button>
        </div>
        <div id="keyPad" class="key-grid"></div>
      </section>
    </section>
  </main>
  <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-backdrop" id="settingsBackdrop"></div>
    <section class="modal-card settings-panel">
      <header class="modal-header">
        <h2 id="settingsTitle">设置</h2>
        <button id="settingsClose" class="ghost" type="button">关闭</button>
      </header>
      <label class="fieldline" for="directHost">
        <span>主机 IP</span>
        <input id="directHost" type="text" inputmode="decimal" placeholder="例如 192.168.1.23">
      </label>
      <label class="fieldline" for="directPort">
        <span>端口</span>
        <input id="directPort" type="number" min="1" max="65535" placeholder="8790">
      </label>
      <div class="row">
        <button id="openDirectBtn" type="button">直连打开</button>
        <button id="saveDirectBtn" class="secondary" type="button">保存</button>
      </div>
      <p class="hint">直连会打开 http://主机IP:端口，不走 Cloudflare。手机需和电脑在同一局域网。</p>
      <label class="checkline">
        <input id="bubbleSetting" type="checkbox">
        <span>按键气泡</span>
      </label>
      <label class="checkline">
        <input id="vibrateSetting" type="checkbox">
        <span>按键震动</span>
      </label>
      <label class="range-line" for="wheelSensitivity">
        <span>滚轮灵敏度</span>
        <input id="wheelSensitivity" type="range" min="12" max="48" step="3">
      </label>
      <label class="range-line" for="touchSensitivity">
        <span>触控板灵敏度</span>
        <input id="touchSensitivity" type="range" min="0.8" max="3" step="0.1">
      </label>
    </section>
  </div>
  <div id="screenFrameModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="屏幕截图预览">
    <div class="modal-backdrop" id="screenFrameBackdrop"></div>
    <section class="modal-card screen-frame-card">
      <button id="screenFrameClose" class="ghost screen-frame-close" type="button" aria-label="关闭屏幕截图">×</button>
      <div id="screenFrameViewport" class="screen-frame-viewport">
        <div id="screenFrameStage" class="screen-frame-stage">
          <img id="screenFrameImage" alt="屏幕截图预览">
        </div>
      </div>
    </section>
  </div>
  <script src="/static/vendor/panzoom.min.js?v=20260703-01"></script>
  <script src="/static/app.js?v=20260703-01"></script>
</body>
</html>
